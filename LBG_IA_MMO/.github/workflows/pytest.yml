name: pytest

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Run pytest (monorepo packages)
        working-directory: LBG_IA_MMO
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PIP_NO_PYTHON_VERSION_WARNING: "1"
        run: |
          chmod +x infra/ci/test_pytest.sh
          bash infra/ci/test_pytest.sh

      - name: Bash syntax (smokes Pilot / core desktop)
        run: |
          bash -n LBG_IA_MMO/infra/scripts/smoke_lan_core_desktop.sh
          bash -n LBG_IA_MMO/infra/scripts/smoke_lan_quick.sh
          bash -n LBG_IA_MMO/infra/scripts/smoke_lan_pilot_agent_proxies.sh
          if [ -f infra/scripts/smoke_lan_core_desktop.sh ]; then bash -n infra/scripts/smoke_lan_core_desktop.sh; fi
